<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakfast Suggester</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f3f0;
      padding: 1rem;
      min-height: 100vh;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1a18;
      }
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    .header {
      padding: 1.5rem 1rem;
      background: transparent;
    }

    h1 {
      font-size: 24px;
      font-weight: 500;
      color: #3d3d3a;
      margin-bottom: 0.5rem;
    }

    @media (prefers-color-scheme: dark) {
      h1 {
        color: #c2c0b6;
      }
    }

    .subtitle {
      font-size: 14px;
      color: #73726c;
      margin-bottom: 1.5rem;
    }

    @media (prefers-color-scheme: dark) {
      .subtitle {
        color: #9c9a92;
      }
    }

    .suggestion-box {
      background: #ede8e0;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    @media (prefers-color-scheme: dark) {
      .suggestion-box {
        background: #2a2a28;
      }
    }

    .suggestion-label {
      font-size: 13px;
      color: #73726c;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @media (prefers-color-scheme: dark) {
      .suggestion-label {
        color: #9c9a92;
      }
    }

    .suggestion-text {
      font-size: 20px;
      font-weight: 500;
      color: #3d3d3a;
    }

    @media (prefers-color-scheme: dark) {
      .suggestion-text {
        color: #c2c0b6;
      }
    }

    button {
      font-family: inherit;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 0.5px solid #bbb9b0;
      background: white;
      color: #3d3d3a;
      padding: 12px;
      font-size: 14px;
    }

    @media (prefers-color-scheme: dark) {
      button {
        background: #2a2a28;
        color: #c2c0b6;
        border-color: #5f5e5a;
      }
    }

    button:hover {
      background: #f5f3f0;
    }

    @media (prefers-color-scheme: dark) {
      button:hover {
        background: #3a3a38;
      }
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .suggest-btn {
      width: 100%;
      margin-bottom: 1.5rem;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #bbb9b0;
    }

    @media (prefers-color-scheme: dark) {
      .suggest-btn {
        border-color: #5f5e5a;
      }
    }

    .backup-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 2rem;
    }

    .backup-buttons button {
      padding: 10px 12px;
      font-size: 13px;
    }

    .divider {
      border-top: 0.5px solid #bbb9b0;
      padding-top: 1.5rem;
      margin-bottom: 1.5rem;
    }

    @media (prefers-color-scheme: dark) {
      .divider {
        border-color: #5f5e5a;
      }
    }

    h2 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 1rem;
      color: #3d3d3a;
    }

    @media (prefers-color-scheme: dark) {
      h2 {
        color: #c2c0b6;
      }
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    input {
      flex: 1;
      padding: 10px 12px;
      border: 0.5px solid #bbb9b0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: white;
      color: #3d3d3a;
    }

    @media (prefers-color-scheme: dark) {
      input {
        background: #2a2a28;
        color: #c2c0b6;
        border-color: #5f5e5a;
      }
    }

    input:focus {
      outline: none;
      border-color: #378add;
    }

    .dish-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dish-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: white;
      border: 0.5px solid #bbb9b0;
      border-radius: 8px;
      font-size: 14px;
      color: #3d3d3a;
    }

    @media (prefers-color-scheme: dark) {
      .dish-item {
        background: #2a2a28;
        color: #c2c0b6;
        border-color: #5f5e5a;
      }
    }

    .dish-item span {
      flex: 1;
    }

    .dish-item button {
      padding: 4px 8px;
      background: transparent;
      border: 0.5px solid #bbb9b0;
      font-size: 12px;
      color: #73726c;
    }

    @media (prefers-color-scheme: dark) {
      .dish-item button {
        border-color: #5f5e5a;
        color: #9c9a92;
      }
    }

    .empty-state {
      font-size: 14px;
      color: #73726c;
      text-align: center;
      padding: 2rem 0;
      display: none;
    }

    @media (prefers-color-scheme: dark) {
      .empty-state {
        color: #9c9a92;
      }
    }

    #fileInput {
      display: none;
    }

    .alert {
      padding: 12px;
      margin-bottom: 1rem;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert-success {
      background: #eaf3de;
      color: #3b6d11;
      border: 0.5px solid #97c459;
    }

    @media (prefers-color-scheme: dark) {
      .alert-success {
        background: #173404;
        color: #c0dd97;
        border-color: #3b6d11;
      }
    }

    .alert-error {
      background: #fcebeb;
      color: #a32d2d;
      border: 0.5px solid #f09595;
    }

    @media (prefers-color-scheme: dark) {
      .alert-error {
        background: #501313;
        color: #f7c1c1;
        border-color: #a32d2d;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>What's for breakfast?</h1>
      <p class="subtitle">Quick suggestions to beat decision fatigue</p>
    </div>

    <div class="suggestion-box">
      <p class="suggestion-label">Today's suggestion</p>
      <p class="suggestion-text" id="suggestion">Add some dishes first →</p>
    </div>

    <button id="suggestBtn" class="suggest-btn" onclick="suggestDish()">Suggest Breakfast</button>

    <div class="backup-buttons">
      <button onclick="exportDishes()">📥 Backup</button>
      <button onclick="importDishes()">📤 Restore</button>
    </div>

    <div class="divider">
      <h2>Your breakfast list</h2>

      <div class="input-group">
        <input id="dishInput" type="text" placeholder="e.g., Scrambled eggs">
        <button onclick="addDish()">Add</button>
      </div>

      <div id="alertContainer"></div>

      <div class="dish-list" id="dishList"></div>
      <p class="empty-state" id="emptyState">No dishes yet. Add a few to get started!</p>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".json">

  <script>
    const STORAGE_KEY = 'breakfast_dishes';

    function loadDishes() {
      const stored = localStorage.getItem(STORAGE_KEY);
      return stored ? JSON.parse(stored) : [];
    }

    function saveDishes(dishes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(dishes));
      renderDishes();
      updateSuggestionUI();
    }

    function renderDishes() {
      const dishes = loadDishes();
      const listEl = document.getElementById('dishList');
      const emptyEl = document.getElementById('emptyState');

      listEl.innerHTML = '';

      if (dishes.length === 0) {
        emptyEl.style.display = 'block';
        return;
      }

      emptyEl.style.display = 'none';

      dishes.forEach((dish, idx) => {
        const item = document.createElement('div');
        item.className = 'dish-item';
        item.innerHTML = `
          <span>${dish}</span>
          <button onclick="removeDish(${idx})">Remove</button>
        `;
        listEl.appendChild(item);
      });
    }

    function addDish() {
      const input = document.getElementById('dishInput');
      const dish = input.value.trim();

      if (!dish) return;

      const dishes = loadDishes();
      if (!dishes.includes(dish)) {
        dishes.push(dish);
        saveDishes(dishes);
        input.value = '';
      }
    }

    function removeDish(idx) {
      const dishes = loadDishes();
      dishes.splice(idx, 1);
      saveDishes(dishes);
    }

    function suggestDish() {
      const dishes = loadDishes();
      if (dishes.length === 0) return;

      const count = dishes.length === 1 ? 1 : 2;
      const suggestions = [];
      const dishIndices = new Set();

      while (suggestions.length < Math.min(count, dishes.length)) {
        const idx = Math.floor(Math.random() * dishes.length);
        if (!dishIndices.has(idx)) {
          dishIndices.add(idx);
          suggestions.push(dishes[idx]);
        }
      }

      const suggestionEl = document.getElementById('suggestion');
      suggestionEl.textContent = suggestions.join('  •  ');
    }

    function showAlert(message, type = 'success') {
      const container = document.getElementById('alertContainer');
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
      container.appendChild(alert);

      setTimeout(() => {
        alert.remove();
      }, 3000);
    }

    function exportDishes() {
      const dishes = loadDishes();
      const data = {
        version: 1,
        exported: new Date().toISOString(),
        dishes: dishes
      };

      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `breakfast-backup-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);

      showAlert(`Backed up ${dishes.length} dishes!`, 'success');
    }

    function importDishes() {
      const input = document.getElementById('fileInput');
      input.click();
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const data = JSON.parse(event.target.result);
          if (data.dishes && Array.isArray(data.dishes)) {
            saveDishes(data.dishes);
            showAlert(`Restored ${data.dishes.length} dishes!`, 'success');
          } else {
            showAlert('Invalid backup file format', 'error');
          }
        } catch (err) {
          showAlert('Error reading backup file', 'error');
        }
      };
      reader.readAsText(file);

      e.target.value = '';
    });

    function updateSuggestionUI() {
      const dishes = loadDishes();
      const suggestBtn = document.getElementById('suggestBtn');
      suggestBtn.disabled = dishes.length === 0;
    }

    document.getElementById('dishInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addDish();
    });

    renderDishes();
    updateSuggestionUI();
  </script>
</body>
</html>
